<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Tanque - Estado Transitorio</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para gráficos en tiempo real -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .water-gradient {
            background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);
            transition: height 0.1s ease-out;
        }
        .tank-container {
            border: 4px solid #475569;
            border-top: none;
            position: relative;
            overflow: hidden;
            border-radius: 0 0 1rem 1rem;
        }
        .overflow-alert {
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div class="container mx-auto p-4 max-w-6xl">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Simulador de Tanque de Agua</h1>
            <p class="text-slate-500 italic">Estado Transitorio: dV/dt = Q<sub>in</sub> - k·V</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Columna 1: Controles -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-slate-200">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">Controles</h2>
                
                <!-- Slider Volumen Inicial -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1">Volumen Inicial (V₀): <span id="v0Val" class="font-bold text-blue-600">50</span> L</label>
                    <input type="range" id="v0Slider" min="0" max="100" value="50" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <!-- Slider Q Entrada -->
                <div class="mb-8">
                    <label class="block text-sm font-medium mb-1">Flujo de Entrada (Q<sub>in</sub>): <span id="qinVal" class="font-bold text-blue-600">5</span> L/min</label>
                    <input type="range" id="qinSlider" min="0" max="20" step="0.5" value="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <!-- Botones -->
                <div class="flex gap-2 mb-8">
                    <button id="btnStart" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded-lg transition-colors">Iniciar</button>
                    <button id="btnReset" class="flex-1 bg-slate-500 hover:bg-slate-600 text-white font-bold py-2 px-4 rounded-lg transition-colors">Reiniciar</button>
                </div>

                <!-- Panel de Datos -->
                <div class="bg-slate-100 p-4 rounded-lg border border-slate-200 space-y-2">
                    <h3 class="text-sm font-bold uppercase text-slate-500 mb-2">Datos en Tiempo Real</h3>
                    <div class="flex justify-between text-sm"><span>Tiempo (t):</span> <span id="txtT" class="font-mono font-bold text-blue-700">0.0 min</span></div>
                    <div class="flex justify-between text-sm"><span>Volumen (V):</span> <span id="txtV" class="font-mono font-bold text-blue-700">50.0 L</span></div>
                    <div class="flex justify-between text-sm"><span>Q<sub>entrada</sub>:</span> <span id="txtQin" class="font-mono font-bold text-blue-700">5.0 L/min</span></div>
                    <div class="flex justify-between text-sm"><span>Q<sub>salida</sub> (k·V):</span> <span id="txtQout" class="font-mono font-bold text-blue-700">5.0 L/min</span></div>
                </div>
            </div>

            <!-- Columna 2: Visualización del Tanque -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-slate-200 flex flex-col items-center justify-center">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2 w-full text-center">Nivel del Tanque</h2>
                
                <div id="overflowBadge" class="hidden overflow-alert bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full mb-2">¡DESBORDE!</div>
                
                <div class="tank-container w-48 h-64 bg-slate-50 flex flex-col justify-end">
                    <!-- Agua -->
                    <div id="waterLevel" class="water-gradient w-full" style="height: 50%;"></div>
                </div>
                <div class="mt-2 font-bold text-slate-600 text-lg">Capacidad: 100L</div>
            </div>

            <!-- Columna 3: Gráfica -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-slate-200 lg:col-span-1">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">Gráfico V vs t</h2>
                <canvas id="mainChart" height="300"></canvas>
            </div>

        </div>
    </div>

    <script>
        // --- Parámetros del Modelo ---
        const V_MAX = 100;
        const k = 0.1; // min^-1
        const dt = 0.1; // Paso de tiempo min
        
        let V = 50;
        let Qin = 5;
        let time = 0;
        let isRunning = false;
        let animationFrame;

        // --- Elementos del DOM ---
        const v0Slider = document.getElementById('v0Slider');
        const qinSlider = document.getElementById('qinSlider');
        const v0ValText = document.getElementById('v0Val');
        const qinValText = document.getElementById('qinVal');
        const btnStart = document.getElementById('btnStart');
        const btnReset = document.getElementById('btnReset');
        
        const txtT = document.getElementById('txtT');
        const txtV = document.getElementById('txtV');
        const txtQin = document.getElementById('txtQin');
        const txtQout = document.getElementById('txtQout');
        
        const waterLevel = document.getElementById('waterLevel');
        const overflowBadge = document.getElementById('overflowBadge');

        // --- Configuración de Chart.js ---
        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Volumen (L)',
                    data: [],
                    borderColor: '#2563eb',
                    backgroundColor: 'rgba(37, 99, 235, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { title: { display: true, text: 'Tiempo (min)' } },
                    y: { 
                        min: 0, 
                        max: 110,
                        title: { display: true, text: 'Litros' } 
                    }
                },
                animation: false
            }
        });

        // --- Lógica de Simulación ---

        function updateSimulation() {
            if (!isRunning) return;

            // Ecuación diferencial: dV/dt = Qin - k*V
            // Euler: V(t + dt) = V(t) + (Qin - k*V(t)) * dt
            let Qout = k * V;
            let dV = Qin - Qout;
            V = V + dV * dt;

            // Límites físicos
            if (V < 0) V = 0;
            if (V > V_MAX) {
                V = V_MAX;
                overflowBadge.classList.remove('hidden');
            } else {
                overflowBadge.classList.add('hidden');
            }

            time += dt;

            updateUI();
            updateChart();

            // Controlamos la velocidad de simulación (aprox 10 FPS para que sea visible)
            setTimeout(() => {
                animationFrame = requestAnimationFrame(updateSimulation);
            }, 50); 
        }

        function updateUI() {
            // Textos numéricos
            txtT.innerText = time.toFixed(1) + " min";
            txtV.innerText = V.toFixed(2) + " L";
            txtQin.innerText = Qin.toFixed(2) + " L/min";
            txtQout.innerText = (k * V).toFixed(2) + " L/min";

            // Visualización Tanque
            const heightPercentage = (V / V_MAX) * 100;
            waterLevel.style.height = `${heightPercentage}%`;
        }

        function updateChart() {
            chart.data.labels.push(time.toFixed(1));
            chart.data.datasets[0].data.push(V);

            // Limitar puntos en gráfica para rendimiento
            if (chart.data.labels.length > 200) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.update();
        }

        // --- Eventos ---

        btnStart.addEventListener('click', () => {
            isRunning = !isRunning;
            btnStart.innerText = isRunning ? "Pausar" : "Reanudar";
            btnStart.classList.toggle('bg-emerald-500');
            btnStart.classList.toggle('bg-amber-500');
            if (isRunning) updateSimulation();
        });

        btnReset.addEventListener('click', () => {
            isRunning = false;
            cancelAnimationFrame(animationFrame);
            
            time = 0;
            V = parseFloat(v0Slider.value);
            Qin = parseFloat(qinSlider.value);
            
            btnStart.innerText = "Iniciar";
            btnStart.className = "flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded-lg transition-colors";
            
            chart.data.labels = [];
            chart.data.datasets[0].data = [];
            chart.update();
            
            overflowBadge.classList.add('hidden');
            updateUI();
        });

        v0Slider.addEventListener('input', (e) => {
            v0ValText.innerText = e.target.value;
            if (!isRunning && time === 0) {
                V = parseFloat(e.target.value);
                updateUI();
            }
        });

        qinSlider.addEventListener('input', (e) => {
            Qin = parseFloat(e.target.value);
            qinValText.innerText = Qin;
            txtQin.innerText = Qin.toFixed(2) + " L/min";
        });

        // Inicializar UI
        updateUI();

    </script>
</body>
</html>
